<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | AMRITA SEO LIMITED</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xl);
    }
    .error-page h1 { font-size: clamp(4rem, 10vw, 8rem); margin-bottom: var(--space-sm); color: var(--color-tan); }
    .error-page h2 { margin-bottom: var(--space-md); }
    .error-page p { margin-bottom: var(--space-lg); color: var(--color-brown); max-width: 440px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>Sorry, the page you're looking for doesn't exist. Let's get you back to something useful.</p>
      <a href="/" class="btn btn-primary">Back to Home</a>
    </div>
  </div>
</body>
</html>
